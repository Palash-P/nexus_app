name: nexus_app
description: "AI Knowledge Base mobile client for Nexus"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Dependency injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.1.4

  # Storage
  flutter_secure_storage: ^9.2.2

  # Functional programming
  dartz: ^0.10.1

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # File upload
  file_picker: ^8.0.7

  # UI
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.7.3


  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500

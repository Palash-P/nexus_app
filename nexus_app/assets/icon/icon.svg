<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13131A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Outer hex ring -->
  <polygon
    points="512,170 775,312 775,598 512,740 249,598 249,312"
    fill="none"
    stroke="url(#hex)"
    stroke-width="28"
    stroke-linejoin="round"/>

  <!-- Mid hex translucent -->
  <polygon
    points="512,284 660,370 660,540 512,626 364,540 364,370"
    fill="url(#hex)"
    opacity="0.15"/>

  <!-- Inner hex solid -->
  <polygon
    points="512,360 606,415 606,525 512,580 418,525 418,415"
    fill="url(#hex)"
    opacity="0.95"/>

  <!-- Connector lines top -->
  <line x1="512" y1="170" x2="512" y2="284" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
  <!-- top-right -->
  <line x1="775" y1="312" x2="660" y2="370" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
  <!-- bottom-right -->
  <line x1="775" y1="598" x2="660" y2="540" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
  <!-- bottom -->
  <line x1="512" y1="740" x2="512" y2="626" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
  <!-- bottom-left -->
  <line x1="249" y1="598" x2="364" y2="540" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
  <!-- top-left -->
  <line x1="249" y1="312" x2="364" y2="370" stroke="url(#hex)" stroke-width="14" opacity="0.55"/>
</svg>